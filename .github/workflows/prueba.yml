name: SIIGO DEBUG VERSION CHECK

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar archivo y ejecutar
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SIIGO_USERNAME: ${{ secrets.SIIGO_USERNAME }}
          SIIGO_PASSWORD: ${{ secrets.SIIGO_PASSWORD }}
          SIIGO_ACCESS_KEY: ${{ secrets.SIIGO_ACCESS_KEY }}
        run: |
          echo "COMMIT ACTUAL:"
          git rev-parse HEAD
          echo "BUSCANDO open_by_key:"
          grep -n "open_by_key" siigo_sync.py || true
          echo "BUSCANDO gc.open:"
          grep -n 'gc.open("DDG_data_2026")' siigo_sync.py || true
          echo "INICIO SCRIPT:"
          python siigo_sync.py
